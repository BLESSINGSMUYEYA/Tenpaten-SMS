services:
  - type: web
    name: tenpaten-api
    runtime: node
    region: oregon
    buildCommand: pnpm install --prod=false && pnpm run build
    startCommand: node apps/api/dist/apps/api/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
