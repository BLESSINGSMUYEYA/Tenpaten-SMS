services:
  - type: web
    name: tenpaten-api
    runtime: node
    region: oregon
    rootDir: apps/api
    buildCommand: cd ../.. && pnpm install --include=dev && pnpm run build
    startCommand: node dist/apps/api/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
